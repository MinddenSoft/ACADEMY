name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: |
          npm ci
          npm --prefix developer-ia-academy ci
          npm --prefix office-ia-academy ci
      - name: Build developer-ia-academy
        run: npm --prefix developer-ia-academy run build
      - name: Build office-ia-academy
        run: npm --prefix office-ia-academy run build
      - name: Combine builds for deployment
        run: |
          mkdir -p deploy/developer-ia-academy
          mkdir -p deploy/office-ia-academy
          cp -r developer-ia-academy/dist/* deploy/developer-ia-academy/
          cp -r office-ia-academy/dist/* deploy/office-ia-academy/
          cp index.html deploy/
          cp 404.html deploy/
          touch deploy/.nojekyll
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
